image:
  repository: ghcr.io/ferrislabs/slides
  # Set to the short-sha pushed by the CI (no default to avoid stale tags).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 2

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 80

httpRoute:
  enabled: true
  parentRefs:
    - name: gateway
      namespace: gateway-system
  hostnames:
    - slides.example.com
  matches:
    - path:
        type: PathPrefix
        value: /

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 2
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

nameOverride: ""
fullnameOverride: ""
