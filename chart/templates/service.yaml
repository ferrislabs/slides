apiVersion: v1
kind: Service
metadata:
  name: {{ include "slides.fullname" . }}
  labels:
    {{- include "slides.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "slides.selectorLabels" . | nindent 4 }}
