server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionnés par Vite (hash dans le nom) : cache long.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # L'entrée HTML doit toujours être revalidée pour récupérer
    # la dernière manifest avec les nouveaux hashs d'assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Healthcheck pour les plateformes (k8s, Cloud Run, Fly…).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # Hardening basique.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
